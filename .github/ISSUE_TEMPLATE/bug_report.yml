name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: MD Reader version
      description: Shown in the installer filename / title bar (e.g. 1.4.2).
      placeholder: "1.4.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Other (note below)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See the error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or notes
      description: Optional — drag images here, or paste any error text.
    validations:
      required: false
