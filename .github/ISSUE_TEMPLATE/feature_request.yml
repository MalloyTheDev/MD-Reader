name: Feature request
description: Suggest an idea or improvement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like MD Reader to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or extra context
      description: Optional — other approaches you considered, mockups, or examples.
    validations:
      required: false
